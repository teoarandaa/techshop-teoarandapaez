{% extends "base.html" %}

{% block title %}Error - TechShop{% endblock %}

{% block content %}
<div class="error-container">
    <div class="error-icon">⚠️</div>
    <h1>Oops! Alguna cosa ha anat malament</h1>
    <p class="error-message">{{ error }}</p>
    <div class="error-actions">
        <a href="{{ url_for('index') }}" class="btn btn-primary">Tornar a l'Inici</a>
        <a href="{{ url_for('products.show_products') }}" class="btn btn-secondary">Veure Productes</a>
    </div>
</div>
{% endblock %}
