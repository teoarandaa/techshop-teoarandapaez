<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}TechShop{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    {% block extra_css %}{% endblock %}
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a href="{{ url_for('index') }}" class="logo">TechShop</a>
            <ul class="nav-menu">
                <li><a href="{{ url_for('products.show_products') }}">Productes</a></li>
                <li>
                    <a href="{{ url_for('cart.show_cart') }}" class="cart-link">
                        Carretó 
                        <span class="cart-badge" id="cart-badge">{{ cart_count }}</span>
                    </a>
                </li>
            </ul>
        </div>
    </nav>

    <main class="main-content">
        <div class="container">
            {% block content %}{% endblock %}
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2025 TechShop - Tots els drets reservats</p>
            <p>Pràctica MVC amb Flask i SQLite</p>
        </div>
    </footer>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
